syntax = "proto3";

package user.v1;

import "google/protobuf/timestamp.proto";

// User represents a platform user.
message User {
  string id           = 1;
  string email        = 2;
  string display_name = 3;
  string avatar_url   = 4;
  string currency     = 5;
  string timezone     = 6;
  google.protobuf.Timestamp create_time = 7;
  google.protobuf.Timestamp update_time = 8;
}
